set default=0
set timeout=1
insmod all_video
set gfxmode=1920x1080x32,1600x900x32,1280x720x32,1024x768x32,auto
set gfxpayload=keep

menuentry "SzczupakOS" {
    multiboot2 /boot/kernel.bin
    module2 /boot/SHELL.ELF SHELL.ELF
    module2 /boot/FONT.PSF FONT.PSF
    boot
}

menuentry "SzczupakOS (Hardware Safe Mode)" {
    multiboot2 /boot/kernel.bin safe nomodeset nousb nonet noata serialfirst
    module2 /boot/SHELL.ELF SHELL.ELF
    module2 /boot/FONT.PSF FONT.PSF
    boot
}
